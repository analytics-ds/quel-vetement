baseURL = "https://quel-vetement.fr/"
title = "Quel Vêtement"
theme = "quel-vetement"
languageCode = "fr-fr"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
enableRobotsTXT = false
enableEmoji = true
summaryLength = 30
# buildFuture = false : Hugo cache les articles datés dans le futur.
# Combiné au cron GitHub Actions (mardi/vendredi), permet la publication
# automatique à la date prévue (publishDate).
buildFuture = false

[languages]
  [languages.fr]
    locale = "fr-FR"
    weight = 1
    [languages.fr.params]
      description = "Comparatifs, guides d'achat et conseils style pour bien choisir ses vêtements d'homme, du costume au lin."

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[params]
  theme_name = "quel-vetement"
  description = "Comparatifs, guides d'achat et conseils style pour bien choisir ses vêtements d'homme, du costume au lin."
  author_name = "Maxime Coste"
  author_url = ""
  author_job_title = "Rédacteur mode homme"
  ga_id = ""
  color_primary = "#1b2a4a"
  color_primary_light = "#2e4673"
  color_background = "#ffffff"
  color_background_alt = "#f4f5f8"
  color_accent = "#b5895a"
  color_cta = "#b5895a"
  color_text = "#1a1d24"
  font_heading = "Playfair Display"
  font_body = "Lora"
  font_ui = "Inter"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[minify]
  disableXML = true

[[menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1
[[menus.main]]
  name = "Costume"
  url = "/categories/costume/"
  weight = 2
[[menus.main]]
  name = "Lin"
  url = "/categories/lin/"
  weight = 3
[[menus.main]]
  name = "Chemises"
  url = "/categories/chemises/"
  weight = 4
[[menus.main]]
  name = "Pulls et gilets"
  url = "/categories/pulls-et-gilets/"
  weight = 5
[[menus.main]]
  name = "Pantalons et jeans"
  url = "/categories/pantalons-et-jeans/"
  weight = 6
[[menus.main]]
  name = "T-shirts et polos"
  url = "/categories/t-shirts-et-polos/"
  weight = 7
[[menus.main]]
  name = "Vestes et manteaux"
  url = "/categories/vestes-et-manteaux/"
  weight = 8
[[menus.main]]
  name = "Accessoires"
  url = "/categories/accessoires/"
  weight = 9
[[menus.main]]
  name = "Le Blog"
  url = "/blog/"
  weight = 10
