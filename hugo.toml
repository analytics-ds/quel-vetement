baseURL = "https://quel-vetement.fr/"
title = "Quel Vêtement"
theme = "quel-vetement"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
enableRobotsTXT = false
enableEmoji = true
summaryLength = 30
buildFuture = false

[languages]
  [languages.fr]
    languageCode = "fr-fr"
    locale = "fr-FR"
    languageName = "Français"
    weight = 1
    title = "Quel Vêtement"
    [languages.fr.params]
      description = "Comparatifs, guides d'achat et conseils style pour bien choisir ses vêtements d'homme, du costume au lin."
    [[languages.fr.menus.main]]
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menus.main]]
      name = "Costume"
      url = "/categories/costume/"
      weight = 2
    [[languages.fr.menus.main]]
      name = "Lin"
      url = "/categories/lin/"
      weight = 3
    [[languages.fr.menus.main]]
      name = "Chemises"
      url = "/categories/chemises/"
      weight = 4
    [[languages.fr.menus.main]]
      name = "Pulls et gilets"
      url = "/categories/pulls-et-gilets/"
      weight = 5
    [[languages.fr.menus.main]]
      name = "Pantalons et jeans"
      url = "/categories/pantalons-et-jeans/"
      weight = 6
    [[languages.fr.menus.main]]
      name = "T-shirts et polos"
      url = "/categories/t-shirts-et-polos/"
      weight = 7
    [[languages.fr.menus.main]]
      name = "Vestes et manteaux"
      url = "/categories/vestes-et-manteaux/"
      weight = 8
    [[languages.fr.menus.main]]
      name = "Accessoires"
      url = "/categories/accessoires/"
      weight = 9
    [[languages.fr.menus.main]]
      name = "Le Blog"
      url = "/blog/"
      weight = 10

  [languages.en]
    languageCode = "en-us"
    locale = "en-US"
    languageName = "English"
    weight = 2
    title = "Quel Vêtement"
    [languages.en.params]
      description = "Comparisons, buying guides and style advice to help men choose the right clothes, from suits to linen."
    [[languages.en.menus.main]]
      name = "Home"
      url = "/en/"
      weight = 1
    [[languages.en.menus.main]]
      name = "Suits"
      url = "/en/categories/suits/"
      weight = 2
    [[languages.en.menus.main]]
      name = "Linen"
      url = "/en/categories/linen/"
      weight = 3
    [[languages.en.menus.main]]
      name = "Shirts"
      url = "/en/categories/shirts/"
      weight = 4
    [[languages.en.menus.main]]
      name = "Knitwear"
      url = "/en/categories/knitwear/"
      weight = 5
    [[languages.en.menus.main]]
      name = "Trousers and jeans"
      url = "/en/categories/trousers-and-jeans/"
      weight = 6
    [[languages.en.menus.main]]
      name = "T-shirts and polos"
      url = "/en/categories/t-shirts-and-polos/"
      weight = 7
    [[languages.en.menus.main]]
      name = "Jackets and coats"
      url = "/en/categories/jackets-and-coats/"
      weight = 8
    [[languages.en.menus.main]]
      name = "Accessories"
      url = "/en/categories/accessories/"
      weight = 9
    [[languages.en.menus.main]]
      name = "Blog"
      url = "/en/blog/"
      weight = 10

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
    lang = "fr"
    excludeFiles = "en/**"
  [[module.mounts]]
    source = "content/en"
    target = "content"
    lang = "en"

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[params]
  theme_name = "quel-vetement"
  author_name = "Maxime Coste"
  author_url = ""
  author_job_title = "Rédacteur mode homme"
  ga_id = ""
  color_primary = "#1b2a4a"
  color_primary_light = "#2e4673"
  color_background = "#ffffff"
  color_background_alt = "#f4f5f8"
  color_accent = "#b5895a"
  color_cta = "#b5895a"
  color_text = "#1a1d24"
  font_heading = "Playfair Display"
  font_body = "Lora"
  font_ui = "Inter"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[minify]
  disableXML = true
