<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>{{ .Site.Title }}</h4>
                <p>{{ .Site.Params.description }}</p>
            </div>
            <div class="footer-col">
                <h4>Catégories</h4>
                <ul>
                    {{ range .Site.Taxonomies.categories }}
                    <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a></li>
                    {{ end }}
                </ul>
            </div>
            <div class="footer-col">
                <h4>Informations</h4>
                <ul>
                    <li><a href="{{ "/a-propos/" | relURL }}">À propos</a></li>
                    <li><a href="{{ "/contact/" | relURL }}">Contact</a></li>
                    <li><a href="{{ "/mentions-legales/" | relURL }}">Mentions légales</a></li>
                    <li><a href="{{ "/plan-du-site/" | relURL }}">Plan du site</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; {{ now.Year }} {{ .Site.Title }}. Tous droits réservés.</p>
        </div>
    </div>
</footer>
