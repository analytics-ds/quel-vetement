{{ define "main" }}
<section class="list-header"{{ with .Params.image }} style="background-image: linear-gradient(rgba(27,42,74,0.6), rgba(27,42,74,0.8)), url('{{ . | relURL }}');"{{ end }}>
    <div class="container">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}<p class="list-description">{{ . }}</p>{{ end }}
        <span class="list-count">{{ len .Pages }} {{ if gt (len .Pages) 1 }}articles{{ else }}article{{ end }}</span>
    </div>
</section>
<section class="list-content">
    <div class="container">
        <div class="grid-articles">
            {{ range .Pages.ByDate.Reverse }}
            {{ partial "article-card.html" . }}
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
