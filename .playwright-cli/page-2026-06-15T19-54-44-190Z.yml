    - generic [ref=e28]:
      - heading "Quel vêtement pour quelle occasion ?" [level=2] [ref=e29]
      - paragraph [ref=e30]:
        - text: Savoir
        - strong [ref=e31]: quel vêtement
        - text: "porter ne devrait pas tourner au casse-tête. Entre les codes vestimentaires implicites, les dress codes d’entreprise et les imprévus de dernière minute, on se retrouve souvent à hésiter devant l’armoire. L’idée de Quel Vêtement est simple : partir de votre situation réelle (une occasion, un lieu, une météo, un niveau d’habillage) et vous guider, pièce par pièce, vers la tenue la plus juste."
      - paragraph [ref=e32]: "On ne se contente pas de dire quoi mettre, on explique pourquoi : quelle coupe de costume pour un mariage, quelle chemise pour un entretien d’embauche, quelles chaussures porter avec un chino. Des repères clairs et concrets pour ne plus jamais vous demander quel vêtement choisir."
      - heading "Choisir ses vêtements selon la situation, la saison et son style" [level=2] [ref=e33]
      - paragraph [ref=e34]: "Le bon vêtement n’existe pas dans l’absolu : il dépend du contexte. Une même journée peut réclamer une tenue de bureau le matin et un look de soirée le soir. Nos guides couvrent les grandes situations de la vie d’homme et chaque famille de vêtements, du costume au lin, de la chemise aux sneakers, pour vous aider à composer un vestiaire cohérent et à savoir, d’un coup d’œil, quoi porter et quand."
