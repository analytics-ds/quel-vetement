    - generic [ref=e21]:
      - generic [ref=e22]: Le vestiaire homme, décodé
      - heading "Quel vêtement porter ? Le bon choix pour chaque situation" [level=1] [ref=e23]
      - paragraph [ref=e24]: "Mariage, entretien, premier rendez-vous ou bureau : on vous aide à trouver la tenue juste selon l'occasion, et à comprendre pourquoi elle fonctionne."
      - link "Voir les situations" [ref=e25] [cursor=pointer]:
